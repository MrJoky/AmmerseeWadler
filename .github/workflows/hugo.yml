name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: "0.125.7"
  HUGO_ENVIRONMENT: production
  TZ: Europe/Berlin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: resources
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum', '**/package-lock.json', '**/hugo.toml', '**/config/**/*.toml', 'assets/**', 'layouts/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RAR_RACEMAP_EVENT_ID: ${{ vars.RAR_RACEMAP_EVENT_ID }}
          RAR_RACEMAP_PROXY_URL: ${{ vars.RAR_RACEMAP_PROXY_URL }}
          HUGO_BASEURL: ${{ vars.HUGO_BASEURL }}
        run: |
          if [ -n "$HUGO_BASEURL" ]; then
            hugo --gc --minify --baseURL "$HUGO_BASEURL"
          else
            repo_name="${GITHUB_REPOSITORY#*/}"
            hugo --gc --minify --baseURL "https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
